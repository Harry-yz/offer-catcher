version: '3.8'

services:
  offer-catcher:
    build: .
    container_name: offer-catcher
    ports:
      - "8080:8080"
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MINERU_API_KEY=${MINERU_API_KEY}
      - API_BASE=https://api.xiaomimimo.com/v1
      - MODEL=mimo-v2.5-pro
    restart: unless-stopped
